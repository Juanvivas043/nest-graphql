name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Docker login
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Docker build
      run: |
        echo "Comenzando build"
        docker build -t juanviv31/docker-graphql:0.0.2 .
        echo "Build terminada"

    - name: Docker push
      run: |
        echo "Comenzando push"
        docker push juanviv31/docker-graphql:0.0.2
        echo "Terminando push"

    # - name: Build the Docker image
    #   run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)
