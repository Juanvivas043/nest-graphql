name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Git Semantic Version
      uses: PaulHatch/semantic-version@v4.0.3
      with:
        major_pattern: "major: "
        minor_pattern: "feature: "
        format: "${major}.${minor}.${patch}-prerelease${increment}"
      id: version
        
    - name: Docker login
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Docker build
      env:
        NEW_VERSION: ${{ steps.version.outputs.version }}
      run: |
        echo "Comenzando build"
        docker build -t juanviv31/docker-graphql:$NEW_VERSION .
        docker build -t juanviv31/docker-graphql:latest .
        echo "Build terminada"

    - name: Docker push
      env:
        NEW_VERSION: ${{ steps.version.outputs.version }}
      run: |
        echo "Comenzando push"
        docker push juanviv31/docker-graphql:$NEW_VERSION
        docker push juanviv31/docker-graphql:latest
        echo "Terminando push"

    # - name: Build the Docker image
    #   run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)
